<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Português Divertido - Julia 🌟</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{--azul:#4A90E2;--roxo:#9B59B6;--verde:#27AE60;--laranja:#F39C12;--rosa:#E91E8C;--vermelho:#E74C3C;--amarelo:#F1C40F;--fundo:#FFF9F0;--texto:#2C3E50;--branco:#FFF;--sombra:rgba(0,0,0,.15)}
body{font-family:'Nunito','Arial Rounded MT Bold',Arial,sans-serif;background:var(--fundo);min-height:100vh;overflow-x:hidden;color:var(--texto)}

/* BOLHAS */
.bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.b{position:absolute;border-radius:50%;opacity:.09;animation:flu linear infinite}
.b:nth-child(1){width:60px;height:60px;background:var(--roxo);left:5%;animation-duration:12s}
.b:nth-child(2){width:40px;height:40px;background:var(--rosa);left:18%;animation-duration:9s;animation-delay:2s}
.b:nth-child(3){width:75px;height:75px;background:var(--azul);left:30%;animation-duration:14s;animation-delay:1s}
.b:nth-child(4){width:50px;height:50px;background:var(--laranja);left:45%;animation-duration:11s;animation-delay:3s}
.b:nth-child(5){width:35px;height:35px;background:var(--verde);left:60%;animation-duration:13s;animation-delay:.5s}
.b:nth-child(6){width:65px;height:65px;background:var(--amarelo);left:72%;animation-duration:10s;animation-delay:4s}
.b:nth-child(7){width:45px;height:45px;background:var(--rosa);left:85%;animation-duration:15s;animation-delay:1.5s}
.b:nth-child(8){width:55px;height:55px;background:var(--roxo);left:50%;animation-duration:12s;animation-delay:5s}
@keyframes flu{0%{transform:translateY(110vh);opacity:.03}50%{opacity:.12}100%{transform:translateY(-10vh);opacity:.03}}

#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}

/* TELAS */
.tela{display:none;width:100%;max-width:700px;flex-direction:column;align-items:center;gap:18px;animation:fi .35s ease}
.tela.ativa{display:flex}
@keyframes fi{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* TELA INICIAL */
.logo{font-size:72px;display:block;text-align:center;animation:bounce 1.5s infinite}
.titulo{font-size:2.3rem;font-weight:900;text-align:center;line-height:1.15;margin-top:6px;background:linear-gradient(135deg,var(--roxo),var(--rosa),var(--laranja));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.julia{font-size:1.15rem;font-weight:800;color:var(--rosa);text-align:center;margin-top:2px}
.sub{font-size:1.1rem;font-weight:700;color:var(--laranja);text-align:center}
.aviso-prova{background:linear-gradient(135deg,#FFF3CD,#FFF9E6);border:3px solid var(--amarelo);border-radius:20px;padding:14px 20px;text-align:center;font-size:1rem;font-weight:700;color:#856404;width:100%}

/* GRADE */
.grade{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}
.card{background:var(--branco);border-radius:24px;padding:18px 12px;text-align:center;cursor:pointer;border:3px solid #D0D0D0;box-shadow:0 6px 20px var(--sombra);transition:transform .15s;font-family:inherit;width:100%}
.card:active{transform:scale(.94)}
.card-e{font-size:42px;display:block;margin-bottom:8px}
.card-n{font-size:.92rem;font-weight:800;color:var(--texto);line-height:1.3}

/* cores */
.card[data-tema="agostino"]{border-color:var(--roxo);background:linear-gradient(145deg,#F4ECF7,#fff)}
.card[data-tema="rapunzel"]{border-color:var(--rosa);background:linear-gradient(145deg,#FDE2F3,#fff)}
.card[data-tema="mn"]{border-color:var(--azul);background:linear-gradient(145deg,#EBF5FF,#fff)}
.card[data-tema="til"]{border-color:var(--laranja);background:linear-gradient(145deg,#FEF9E7,#fff)}
.card[data-tema="maiusculas"]{border-color:var(--verde);background:linear-gradient(145deg,#E9F7EF,#fff)}
.card[data-tema="expressoes"]{border-color:var(--vermelho);background:linear-gradient(145deg,#FDEDEC,#fff)}
.card[data-tema="lendas"]{border-color:var(--amarelo);background:linear-gradient(145deg,#FEF9E7,#fff)}
.card[data-tema="escrita"]{border-color:var(--roxo);background:linear-gradient(145deg,#F4ECF7,#fff)}

/* QUIZ */
.hdr{width:100%;background:var(--branco);border-radius:20px;padding:12px 18px;box-shadow:0 4px 16px var(--sombra);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.hdr-t{font-size:1rem;font-weight:900}
.hdr-p{font-size:.88rem;font-weight:700;color:#666}
.hdr-e{font-size:1.2rem;letter-spacing:2px}
.bar-w{width:100%;background:#E0E0E0;border-radius:10px;height:12px;overflow:hidden}
.bar{height:100%;background:linear-gradient(90deg,var(--verde),var(--amarelo));border-radius:10px;transition:width .4s ease;width:0%}

.cperg{width:100%;background:var(--branco);border-radius:24px;padding:24px 20px;box-shadow:0 6px 24px var(--sombra);text-align:center}
.perg-e{font-size:44px;display:block;margin-bottom:10px}
.perg-t{font-size:1.3rem;font-weight:800;color:var(--texto);line-height:1.4;white-space:pre-line}

.grid-o{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%}
.grid-o.col1{grid-template-columns:1fr}

.btn-o{background:var(--branco);border:3px solid #CCC;border-radius:20px;padding:16px 10px;font-family:inherit;font-size:1.1rem;font-weight:800;color:var(--texto);cursor:pointer;box-shadow:0 4px 14px var(--sombra);transition:transform .12s,border-color .15s,background .15s;min-height:66px;width:100%;line-height:1.25;text-align:center}
.btn-o:active{transform:scale(.93)}
.btn-o.certa{background:#E8F8F5;border-color:var(--verde);color:var(--verde);animation:pc .4s ease}
.btn-o.errada{background:#FDEDEC;border-color:var(--vermelho);color:var(--vermelho);animation:sk .4s ease}
@keyframes pc{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes sk{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

.fb{width:100%;border-radius:20px;padding:16px 20px;text-align:center;font-size:1.2rem;font-weight:900;display:none;animation:fi .3s ease}
.fb.c{background:#D5F5E3;color:#1E8449;border:3px solid var(--verde)}
.fb.e{background:#FADBD8;color:#922B21;border:3px solid var(--vermelho)}

.abtn{display:flex;gap:14px;width:100%;flex-wrap:wrap}
.ba{flex:1;min-width:130px;padding:18px 14px;border:none;border-radius:20px;font-family:inherit;font-size:1.05rem;font-weight:800;cursor:pointer;box-shadow:0 5px 16px var(--sombra);transition:transform .12s}
.ba:active{transform:scale(.93)}
.bp{background:linear-gradient(135deg,var(--verde),#1ABC9C);color:#fff}
.bm{background:linear-gradient(135deg,#95A5A6,#7F8C8D);color:#fff}
.bn{background:linear-gradient(135deg,var(--roxo),var(--rosa));color:#fff}
.bv{align-self:flex-start;background:none;border:none;font-family:inherit;font-size:1rem;font-weight:800;color:var(--azul);cursor:pointer;padding:4px 0}
.bv:active{opacity:.6}

/* FINAL */
.trofeu{font-size:90px;display:block;text-align:center;animation:bounce 1.2s infinite}
.tf{font-size:2rem;font-weight:900;text-align:center;background:linear-gradient(135deg,var(--laranja),var(--rosa));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ef{font-size:2.6rem;letter-spacing:4px;text-align:center;margin:6px 0}
.af{font-size:1.3rem;font-weight:800;color:var(--roxo);text-align:center}
.mf{font-size:1rem;font-weight:700;color:#7F8C8D;text-align:center;margin-top:8px}
.cr{width:100%;background:var(--branco);border-radius:24px;padding:28px 24px;box-shadow:0 6px 24px var(--sombra);display:flex;flex-direction:column;gap:6px}

/* CONFETE */
.conf{position:fixed;top:-10px;pointer-events:none;z-index:999;font-size:1.6rem;animation:cair 1.4s ease forwards}
@keyframes cair{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(360deg);opacity:0}}

/* ESCRITA - CANVAS */
.escrita-area{width:100%;background:var(--branco);border-radius:24px;padding:20px;box-shadow:0 6px 24px var(--sombra);text-align:center}
.escrita-palavra{font-size:2rem;font-weight:900;color:var(--roxo);margin-bottom:6px;letter-spacing:2px}
.escrita-dica{font-size:.95rem;font-weight:700;color:#888;margin-bottom:12px}
.canvas-wrap{position:relative;width:100%;max-width:500px;margin:0 auto;border:3px dashed #CCC;border-radius:16px;background:#FFFEF6;overflow:hidden}
.canvas-wrap canvas{display:block;width:100%;height:200px}
.canvas-linhas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.btn-limpar{margin-top:10px;background:var(--vermelho);color:#fff;border:none;border-radius:14px;padding:12px 24px;font-family:inherit;font-size:1rem;font-weight:800;cursor:pointer}
.btn-limpar:active{transform:scale(.93)}
.escrita-progresso{font-size:1rem;font-weight:700;color:#666;margin-top:8px}

@media(max-width:420px){
  .titulo{font-size:1.8rem}.card-e{font-size:36px}.card-n{font-size:.82rem}
  .perg-t{font-size:1.1rem}.btn-o{font-size:.98rem;min-height:58px;padding:12px 8px}
  .escrita-palavra{font-size:1.6rem}
}
</style>
</head>
<body>

<div class="bg" aria-hidden="true">
  <div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div>
  <div class="b"></div><div class="b"></div><div class="b"></div><div class="b"></div>
</div>

<div id="app">

  <!-- TELA MENU -->
  <div id="tela-menu" class="tela ativa">
    <div style="text-align:center;margin-top:8px">
      <span class="logo">📖</span>
      <h1 class="titulo">Português<br>Divertido!</h1>
      <p class="julia">✨ para Julia ✨</p>
    </div>
    <div class="aviso-prova">📅 Revisão para a prova do dia 24/06!</div>

    <div class="grade">
      <button class="card" data-tema="agostino" onclick="window.iniciarTema('agostino')">
        <span class="card-e">🏚️</span><span class="card-n">A Casa<br>Abandonada</span>

      <button class="card" data-tema="maiusculas" onclick="window.iniciarTema('maiusculas')">
        <span class="card-e">🔠</span><span class="card-n">Letra<br>Maiúscula</span>
      </button>
      <button class="card" data-tema="expressoes" onclick="window.iniciarTema('expressoes')">
        <span class="card-e">💭</span><span class="card-n">O que<br>significa?</span>
      </button>
      <button class="card" data-tema="lendas" onclick="window.iniciarTema('lendas')">
        <span class="card-e">🧙</span><span class="card-n">Lendas<br>Brasileiras</span>

      <button class="card" data-tema="escrita" onclick="window.abrirEscrita()">
        <span class="card-e">✍️</span><span class="card-n">Praticar<br>Escrita</span>
      </button>
    </div>
  </div>

  <!-- TELA QUIZ -->
  <div id="tela-quiz" class="tela">
    <div class="hdr">
      <span id="hdr-t" class="hdr-t">📖</span>
      <span id="hdr-p" class="hdr-p">1 / 6</span>
      <span id="hdr-e" class="hdr-e">☆☆☆☆☆</span>

    <div class="bar-w"><div id="bar" class="bar"></div></div>
    <div class="cperg">
      <span id="perg-e" class="perg-e">📖</span>
      <p id="perg-t" class="perg-t">...</p>
    </div>
    <div id="grid-o" class="grid-o"></div>
    <div id="fb" class="fb"></div>
    <div class="abtn">
      <button id="btn-mq" class="ba bm" onclick="window.mostrarTela('tela-menu')">🏠 Menu</button>
      <button id="btn-px" class="ba bp" style="display:none" onclick="window.avancar()">Próxima ➡️</button>
    </div>
  </div>

  <!-- TELA ESCRITA -->
  <div id="tela-escrita" class="tela">
    <button class="bv" onclick="window.mostrarTela('tela-menu')">⬅️ Voltar ao Menu</button>
    <div class="escrita-area">
      <p style="font-size:1.1rem;font-weight:900;color:var(--roxo);margin-bottom:4px">✍️ Praticar Escrita</p>
      <p class="escrita-dica">Escreva a palavra com a caneta!</p>
      <p id="esc-palavra" class="escrita-palavra">CAMPO</p>
      <p id="esc-dica2" class="escrita-dica">Use letra cursiva 📝</p>
      <div class="canvas-wrap">
        <canvas id="canvas"></canvas>
      </div>
      <button class="btn-limpar" onclick="window.limparCanvas()">🗑️ Apagar</button>
      <p id="esc-prog" class="escrita-progresso">Palavra 1 de 10</p>
    </div>
    <div class="abtn">
      <button class="ba bm" onclick="window.mostrarTela('tela-menu')">🏠 Menu</button>
      <button id="btn-esc-px" class="ba bp" onclick="window.proxPalavra()">Próxima ✏️</button>
    </div>
  </div>

  <!-- TELA FINAL -->
  <div id="tela-final" class="tela">
    <div class="cr">
      <span class="trofeu">🏆</span>
      <h2 id="tf" class="tf">Parabéns! 🎊</h2>
      <div id="ef" class="ef">⭐⭐⭐⭐⭐</div>
      <p id="af" class="af">6 / 6 acertos!</p>
      <p id="mf" class="mf">Você é incrível! 🎉</p>
    </div>
    <div class="abtn" style="max-width:700px;width:100%">
      <button class="ba bn" onclick="window.iniciarTema(estado.tema)">🔄 Jogar de Novo</button>
      <button class="ba bm" onclick="window.mostrarTela('tela-menu')">🏠 Menu</button>
    </div>
  </div>

</div>

/* ================================================================
   ESTADO
================================================================ */
var estado = {tema:'',perguntas:[],indice:0,acertos:0,respondeu:false};
var escIdx = 0;
var escPalavras = [];

/* ================================================================
   UTILITÁRIOS
================================================================ */
function embaralhar(a){var arr=a.slice();for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}return arr;}

function mostrarTela(id){
  var t=document.querySelectorAll('.tela');
  for(var i=0;i<t.length;i++) t[i].classList.remove('ativa');
  document.getElementById(id).classList.add('ativa');
  window.scrollTo(0,0);
}

function calcE(a,t){var p=a/t,n=p>=.9?5:p>=.7?4:p>=.5?3:p>=.3?2:1,s='';for(var i=0;i<5;i++) s+=i<n?'⭐':'☆';return s;}

function confete(){
  var e=['🎉','⭐','🌟','✨','🎊','🏅','🎈'];
  for(var i=0;i<12;i++){
    (function(d){setTimeout(function(){
      var el=document.createElement('span');el.className='conf';
      el.textContent=e[Math.floor(Math.random()*e.length)];
      el.style.left=Math.random()*95+'vw';
      el.style.animationDuration=(.8+Math.random()*.9)+'s';
      document.body.appendChild(el);
      setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},1800);
    },d);})(i*80);
  }
}

/* ================================================================
   QUIZ
================================================================ */
function iniciarTema(tema){
  estado.tema=tema;
  estado.perguntas=embaralhar(BANCO[tema].perguntas).slice(0,6);
  estado.indice=0;estado.acertos=0;
  mostrarTela('tela-quiz');
  carregarPergunta();
}

function carregarPergunta(){
  estado.respondeu=false;
  var p=estado.perguntas[estado.indice];
  var total=estado.perguntas.length;
  var d=BANCO[estado.tema];

  document.getElementById('hdr-t').textContent=d.nome;
  document.getElementById('perg-e').textContent=d.emoji;
  document.getElementById('hdr-p').textContent='Questão '+(estado.indice+1)+' / '+total;
  document.getElementById('hdr-e').textContent=calcE(estado.acertos,total);
  document.getElementById('bar').style.width=((estado.indice/total)*100)+'%';
  document.getElementById('perg-t').textContent=p.texto;

  var grid=document.getElementById('grid-o');
  grid.innerHTML='';
  /* Se opções forem longas, usar 1 coluna */
  var usarCol1 = false;
  for(var c=0;c<p.opcoes.length;c++){if(p.opcoes[c].length>25) usarCol1=true;}
  grid.className = usarCol1 ? 'grid-o col1' : 'grid-o';

  for(var idx=0;idx<p.opcoes.length;idx++){
    var btn=document.createElement('button');
    btn.className='btn-o';
    btn.textContent=p.opcoes[idx];
    btn.setAttribute('data-idx',String(idx));
    btn.setAttribute('onclick','window.responder('+idx+')');
    grid.appendChild(btn);
  }

  var fb=document.getElementById('fb');
  fb.style.display='none';fb.className='fb';
  document.getElementById('btn-px').style.display='none';
}

function responder(escolhido){
  if(estado.respondeu) return;
  estado.respondeu=true;
  var p=estado.perguntas[estado.indice];
  var certa=p.certa,acertou=(escolhido===certa);

  var btns=document.querySelectorAll('.btn-o');
  for(var i=0;i<btns.length;i++){
    btns[i].setAttribute('onclick','');
    var bi=parseInt(btns[i].getAttribute('data-idx'));
    if(bi===certa) btns[i].classList.add('certa');
    else if(bi===escolhido&&!acertou) btns[i].classList.add('errada');
  }

  var fb=document.getElementById('fb');
  if(acertou){
    estado.acertos++;
    var m=['🎉 Muito bem!','⭐ Incrível!','🌟 Parabéns!','🏅 Certíssimo!','✨ Arrasou!'];
    fb.textContent=m[Math.floor(Math.random()*m.length)];
    fb.className='fb c';
    confete();
  } else {
    fb.textContent='😊 Quase! A resposta certa está em verde!';
    fb.className='fb e';
  }
  fb.style.display='block';
  document.getElementById('hdr-e').textContent=calcE(estado.acertos,estado.perguntas.length);

  var btnP=document.getElementById('btn-px');
  btnP.style.display='block';
  btnP.textContent=(estado.indice===estado.perguntas.length-1)?'Ver resultado 🏆':'Próxima ➡️';
}

function avancar(){
  estado.indice++;
  if(estado.indice>=estado.perguntas.length) mostrarResultado();
  else carregarPergunta();
}

function mostrarResultado(){
  var total=estado.perguntas.length,ac=estado.acertos,pct=ac/total;
  document.getElementById('ef').textContent=calcE(ac,total);
  document.getElementById('af').textContent=ac+' / '+total+' acertos!';
  var ms=['Continue praticando! Vai melhorar! 💪','Bom trabalho! Pratique mais! 😊','Muito bem! Você está indo bem! 🌟','Excelente! Você é incrível! 🎉','PERFEITO! Você é um gênio! 🧠✨'];
  document.getElementById('mf').textContent=ms[Math.min(Math.floor(pct*5),4)];
  document.getElementById('bar').style.width='100%';
  confete();
  mostrarTela('tela-final');
}

/* ================================================================
   ESCRITA — CANVAS COM SUPORTE A APPLE PENCIL
================================================================ */
var canvas,ctx,desenhando=false;

function initCanvas(){
  canvas=document.getElementById('canvas');
  var wrap=canvas.parentElement;
  /* Ajusta tamanho real do canvas ao tamanho CSS */
  var rect=wrap.getBoundingClientRect();
  canvas.width=rect.width-6; /* desconta borda */
  canvas.height=200;
  ctx=canvas.getContext('2d');
  ctx.strokeStyle='#2C3E50';
  ctx.lineWidth=3;
  ctx.lineCap='round';
  ctx.lineJoin='round';
  desenharLinhas();

  /* Eventos de toque — pointer events para compatibilidade com Apple Pencil */
  canvas.addEventListener('pointerdown',function(e){
    e.preventDefault();
    desenhando=true;
    var pos=getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x,pos.y);
  });
  canvas.addEventListener('pointermove',function(e){
    e.preventDefault();
    if(!desenhando) return;
    var pos=getPos(e);
    ctx.lineTo(pos.x,pos.y);
    ctx.stroke();
  });
  canvas.addEventListener('pointerup',function(e){
    e.preventDefault();
    desenhando=false;
  });
  canvas.addEventListener('pointerleave',function(e){
    desenhando=false;
  });
  canvas.addEventListener('pointercancel',function(e){
    desenhando=false;
  });

  /* Fallback touch events para navegadores que não suportam pointer events */
  canvas.addEventListener('touchstart',function(e){
    if(e.touches.length===1){
      e.preventDefault();
      desenhando=true;
      var pos=getTouchPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x,pos.y);
    }
  },{passive:false});
  canvas.addEventListener('touchmove',function(e){
    if(!desenhando) return;
    e.preventDefault();
    var pos=getTouchPos(e);
    ctx.lineTo(pos.x,pos.y);
    ctx.stroke();
  },{passive:false});
  canvas.addEventListener('touchend',function(e){
    desenhando=false;
  });
}

function getPos(e){
  var rect=canvas.getBoundingClientRect();
  return {x:e.clientX-rect.left,y:e.clientY-rect.top};
}
function getTouchPos(e){
  var rect=canvas.getBoundingClientRect();
  var t=e.touches[0];
  return {x:t.clientX-rect.left,y:t.clientY-rect.top};
}

function desenharLinhas(){
  /* Desenha linhas de caderno */
  ctx.save();
  ctx.strokeStyle='#E0D6C8';
  ctx.lineWidth=1;
  for(var y=50;y<200;y+=50){
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  }
  /* Linha vermelha de margem */
  ctx.strokeStyle='#F5C6C6';
  ctx.beginPath();
  ctx.moveTo(40,0);
  ctx.lineTo(40,200);
  ctx.stroke();
  ctx.restore();
  /* Restaura estilo de escrita */
  ctx.strokeStyle='#2C3E50';
  ctx.lineWidth=3;
}

function limparCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  desenharLinhas();
}

function abrirEscrita(){
  escPalavras=embaralhar(PALAVRAS).slice(0,10);
  escIdx=0;
  mostrarTela('tela-escrita');
  setTimeout(function(){
    initCanvas();
    mostrarPalavra();
  },100);
}

function mostrarPalavra(){
  var p=escPalavras[escIdx];
  document.getElementById('esc-palavra').textContent=p.palavra;
  document.getElementById('esc-dica2').textContent='💡 Dica: '+p.dica;
  document.getElementById('esc-prog').textContent='Palavra '+(escIdx+1)+' de '+escPalavras.length;
  limparCanvas();
  var btnP=document.getElementById('btn-esc-px');
  btnP.textContent=(escIdx===escPalavras.length-1)?'Finalizar ✅':'Próxima ✏️';
}

function proxPalavra(){
  escIdx++;
  if(escIdx>=escPalavras.length){
    confete();
    escIdx=0;
    mostrarTela('tela-menu');
  } else {
    mostrarPalavra();
  }
}

/* ================================================================
   EXPOR FUNÇÕES NO ESCOPO GLOBAL (window)
   Necessário para onclick inline funcionar no iOS Safari
================================================================ */
window.iniciarTema   = iniciarTema;
window.responder     = responder;
window.avancar       = avancar;
window.mostrarTela   = mostrarTela;
window.abrirEscrita  = abrirEscrita;
window.limparCanvas  = limparCanvas;
window.proxPalavra   = proxPalavra;
</script>
